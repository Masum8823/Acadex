<!DOCTYPE html>
<html lang="en">
<head>
    <title>History - CGPA System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .subject-tag {
            display: inline-block;
            background: #e1e7ff;
            color: #3b5998;
            padding: 2px 8px;
            margin: 2px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid #c5cdec;
        }
        .gpa-badge {
            background: #28a745;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
        .sem-badge {
            background: #6c757d;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        .filter-section {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <nav>
            <span id="welcomeTextHistory">Welcome</span>
            <div class="nav-links">
                <a href="dashboard.html">Calculator</a>
                <a href="history.html" class="active">History</a>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </nav>

        <div class="card">
            <h3>Your Detailed Result History</h3>
            
            <div class="filter-section">
                <label>Filter by Semester:</label>
                <input type="number" id="filterInput" placeholder="Enter Semester No" style="width: 150px; margin: 0;">
                <button onclick="filterResults()" style="width: auto; padding: 10px 20px;">Search</button>
                <button onclick="resetFilter()" style="width: auto; padding: 10px 20px; background: #6c757d;">Reset</button>
            </div>

            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Semester</th>
                        <th>Date</th>
                        <th>GPA</th>
                        <th>Subjects & Grades</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="historyList"></tbody>
            </table>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        let user = JSON.parse(localStorage.getItem('loggedInUser'));
        if(!user) window.location.href = "index.html";
        document.getElementById('welcomeTextHistory').innerText = "History of " + user.name;

        function renderHistory(resultsToDisplay) {
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            
            if(resultsToDisplay && resultsToDisplay.length > 0) {
                resultsToDisplay.forEach((res, index) => {
                    let subjectsHTML = "";
                    if(res.details) {
                        res.details.forEach(sub => {
                            subjectsHTML += `<span class="subject-tag">${sub.name} (${sub.grade})</span>`;
                        });
                    }

                    list.innerHTML += `<tr>
                        <td><span class="sem-badge">Semester ${res.semester || 'N/A'}</span></td>
                        <td>${res.date}</td>
                        <td><span class="gpa-badge">${res.gpa}</span></td>
                        <td>${subjectsHTML}</td>
                        <td><button class="delete-btn" onclick="deleteRecord(${index})">Delete</button></td>
                    </tr>`;
                });
            } else {
                list.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No results found.</td></tr>";
            }
        }

        function filterResults() {
            const val = document.getElementById('filterInput').value;
            if(!val) return alert("Enter a semester number to filter");
            
            const filtered = user.results.filter(r => r.semester == val);
            renderHistory(filtered);
        }

        function resetFilter() {
            document.getElementById('filterInput').value = "";
            renderHistory(user.results);
        }

        function deleteRecord(index) {
            if(confirm("Are you sure you want to delete this record?")) {
                let users = JSON.parse(localStorage.getItem('users'));
                let userIdx = users.findIndex(u => u.id === user.id);
                
                users[userIdx].results.splice(index, 1);
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.setItem('loggedInUser', JSON.stringify(users[userIdx]));
                user = users[userIdx];
                renderHistory(user.results);
            }
        }

        renderHistory(user.results);
    </script>
</body>
</html>
