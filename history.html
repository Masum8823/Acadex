<!DOCTYPE html>
<html lang="en">
<head>
    <title>History - CGPA System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .subject-tag {
            display: inline-block;
            background: #e1e7ff;
            color: #3b5998;
            padding: 2px 8px;
            margin: 2px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid #c5cdec;
        }
        .gpa-badge {
            background: #28a745;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <nav>
            <span id="welcomeTextHistory">Welcome</span>
            <div class="nav-links">
                <a href="dashboard.html">Calculator</a>
                <a href="history.html" class="active">History</a>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </nav>

        <div class="card">
            <h3>Your Detailed Result History</h3>
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Semester GPA</th>
                        <th>Subjects & Grades</th>
                    </tr>
                </thead>
                <tbody id="historyList"></tbody>
            </table>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('loggedInUser'));
        if(!user) window.location.href = "index.html";
        document.getElementById('welcomeTextHistory').innerText = "History of " + user.name;

        const list = document.getElementById('historyList');
        
        if(user.results && user.results.length > 0) {
            [...user.results].reverse().forEach(res => {
                
                let subjectsHTML = "";
                if(res.details) {
                    res.details.forEach(sub => {
                        subjectsHTML += `<span class="subject-tag">${sub.name} (${sub.grade})</span>`;
                    });
                } else {
                    subjectsHTML = "No details found";
                }

                list.innerHTML += `<tr>
                    <td>${res.date}</td>
                    <td><span class="gpa-badge">${res.gpa}</span></td>
                    <td>${subjectsHTML}</td>
                </tr>`;
            });
        } else {
            list.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No results saved yet.</td></tr>";
        }
    </script>
</body>
</html>
