<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Acadex</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-container">
        <form class="auth-box" id="loginForm">
            <h2>Student Login</h2>
            
            <div class="input-group">
                <label for="loginID">Student ID</label>
                <input type="text" id="loginID" placeholder="Enter your ID" required>
            </div>

            <div class="input-group">
                <label for="loginPass">Password</label>
                <input type="password" id="loginPass" placeholder="Enter password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
            
            <p class="switch-text">New Student? <a href="register.html">Register Here</a></p>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
