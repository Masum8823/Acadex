<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CGPA Calculator</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="main-container">
        <nav>
            <span id="welcomeText">Welcome, Student</span>
            <div class="nav-links">
                <a href="dashboard.html" class="active">Dashboard</a>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </nav>

        <div class="card student-info">
            <h3>Student Details</h3>
            <p>ID: <span id="sID"></span> | Dept: <span id="sDept"></span></p>
        </div>

        <div class="card calculator">
            <h3>Add New Subject</h3>
            <div class="input-group-row">
                <input type="text" id="subName" placeholder="Subject Name">
                <input type="number" id="subCredit" placeholder="Credit">
                <input type="number" id="subMarks" placeholder="Marks (0-100)">
                <button onclick="addSubject()">Add</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Credit</th>
                        <th>Marks</th>
                        <th>Grade</th>
                        <th>GPA</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="subjectList"></tbody>
            </table>

            <div class="results">
                <h2>Current Semester GPA: <span id="currentGPA">0.00</span></h2>
                <div class="save-section" style="margin-top: 20px; display: flex; gap: 10px; align-items: center;">
                    <input type="number" id="semesterNum" placeholder="Semester No" style="width: 150px; margin: 0;">
                    <button class="save-btn" onclick="saveSemesterResult()" style="margin: 0; flex: 1;">Save Result</button>
                </div>
            </div>
        </div>

        <div class="card history-card">
            <div class="history-header">
                <h3>Stored Results History</h3>
                <div class="cgpa-display">
                    <h2 id="cgpaText">Overall CGPA: <span id="overallCGPA">0.00</span></h2>
                    <button onclick="generateResultQR()" class="qr-btn">Generate Result QR</button>
                </div>
            </div>

            <div class="filter-row">
                <select id="viewSemesterFilter" onchange="viewResultsBySemester()">
                    <option value="all">View All Semesters</option>
                </select>
                <button onclick="clearAllHistory()" class="clear-btn">Clear History</button>
            </div>

            <table id="storedHistoryTable">
                <thead>
                    <tr>
                        <th>Semester</th>
                        <th>Date</th>
                        <th>GPA</th>
                        <th>Subjects</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="storedHistoryList"></tbody>
            </table>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="modal-content">
            <span onclick="closeQR()" class="close">&times;</span>
            <h3>Student Result QR Code</h3>
            <div id="qrcode"></div>
            <p id="qrInfo"></p>
            <button onclick="closeQR()">Close</button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/calculator.js"></script>
</body>
</html>
