<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard - CGPA Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <nav>
            <span id="welcomeText">Welcome, Student</span>
            <div class="nav-links">
                <a href="dashboard.html" class="active">Dashboard</a>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </nav>

        <div class="card student-info">
            <h3>Student Details</h3>
            <p>ID: <span id="sID"></span> | Dept: <span id="sDept"></span></p>
        </div>

        <div class="card calculator">
            <h3>Add New Subject</h3>
            <div class="input-group-row">
                <input type="text" id="subName" placeholder="Subject Name">
                <input type="number" id="subCredit" placeholder="Credit">
                <input type="number" id="subMarks" placeholder="Marks (0-100)">
                <button onclick="addSubject()">Add</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Credit</th>
                        <th>Marks</th>
                        <th>Grade</th>
                        <th>GPA</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="subjectList"></tbody>
            </table>

            <div class="results">
                <h2>Current Semester GPA: <span id="currentGPA">0.00</span></h2>
                <div class="save-section" style="margin-top: 20px; display: flex; gap: 10px; align-items: center;">
                    <input type="number" id="semesterNum" placeholder="Semester No" style="width: 150px; margin: 0;">
                    <button class="save-btn" onclick="saveSemesterResult()" style="margin: 0; flex: 1;">Save Result</button>
                </div>
            </div>
        </div>

        <!-- NEW: View Stored Results Section -->
        <div class="card history-card">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 15px;">
                <h3>Stored Results History</h3>
                <div style="text-align: right;">
                    <h2 style="margin: 0; color: #28a745;">Overall CGPA: <span id="overallCGPA">0.00</span></h2>
                </div>
            </div>

            <div class="filter-row" style="margin-bottom: 15px; display: flex; gap: 10px;">
                <select id="viewSemesterFilter" onchange="viewResultsBySemester()" style="padding: 10px; border-radius: 4px; border: 1px solid #ddd;">
                    <option value="all">View All Semesters</option>
                </select>
                <button onclick="clearAllHistory()" style="background: #6c757d; width: auto; padding: 0 15px;">Clear History</button>
            </div>

            <table id="storedHistoryTable">
                <thead>
                    <tr>
                        <th>Semester</th>
                        <th>Date</th>
                        <th>GPA</th>
                        <th>Subjects</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="storedHistoryList"></tbody>
            </table>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/calculator.js"></script>
</body>
</html>
